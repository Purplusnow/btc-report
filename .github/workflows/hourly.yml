name: Hourly Report

on:
  schedule:
    - cron: "5 * * * *"
  workflow_dispatch:

concurrency:
  group: hourly-report-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate report
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5-mini
          SYMBOL: BTCUSDT
        shell: bash
        run: |
          for attempt in 1 2 3; do
            if python scripts/generate_report.py; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Report generation failed on attempt $attempt. Retrying in 15 seconds..."
              sleep 15
            fi
          done
          echo "Report generation failed after 3 attempts."
          exit 1

      - name: Commit updated data
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/history.json data/chart_data.json
          if git diff --cached --quiet; then
            echo "No report data changes to commit."
            exit 0
          fi
          git commit -m "Update hourly market report"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
