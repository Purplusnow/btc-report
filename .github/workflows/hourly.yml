name: Hourly Report

on:
  schedule:
    - cron: "5 * * * *"
  workflow_dispatch:

concurrency:
  group: hourly-report-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: gpt-5-mini
      SYMBOL: BTCUSDT
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare report timestamp
        shell: bash
        run: |
          REPORT_TIMESTAMP="$(TZ=Asia/Seoul date '+%Y-%m-%dT%H:%M:%S+09:00')"
          REPORT_COMMIT_DATE="$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S +0900')"
          echo "REPORT_TIMESTAMP=$REPORT_TIMESTAMP" >> "$GITHUB_ENV"
          echo "REPORT_COMMIT_DATE=$REPORT_COMMIT_DATE" >> "$GITHUB_ENV"

      - name: Generate report
        shell: bash
        run: |
          for attempt in 1 2 3; do
            if python scripts/generate_report.py; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Report generation failed on attempt $attempt. Retrying in 15 seconds..."
              sleep 15
            fi
          done
          echo "Report generation failed after 3 attempts."
          exit 1

      - name: Commit updated data
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          commit_report_update() {
            git add data/latest.json data/history.json data/chart_data.json data/strategy_history.json
            if git diff --cached --quiet; then
              echo "No report data changes to commit."
              return 0
            fi
            GIT_AUTHOR_DATE="$REPORT_COMMIT_DATE" GIT_COMMITTER_DATE="$REPORT_COMMIT_DATE" git commit -m "Update hourly market report"
            return 1
          }

          if commit_report_update; then
            exit 0
          fi

          for attempt in 1 2 3; do
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Push rejected on attempt $attempt. Refreshing branch and regenerating report..."
              git fetch origin "${GITHUB_REF_NAME}"
              git reset --hard "origin/${GITHUB_REF_NAME}"
              python scripts/generate_report.py
              commit_report_update && exit 0
              continue
            fi
          done

          echo "Failed to push report update after 3 attempts."
          exit 1
